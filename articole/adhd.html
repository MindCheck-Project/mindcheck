<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arhitecții Haosului - MindCheck</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --card-glass: rgba(30, 41, 59, 0.4);
            --accent-glow: rgba(99, 102, 241, 0.2);
        }

        .article-body { max-width: 800px; margin: 60px auto; color: #cbd5e1; line-height: 1.8; }
        .hero-title { font-size: clamp(2.5rem, 5vw, 3.8rem); font-weight: 800; margin-bottom: 20px; letter-spacing: -2px; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }

        /* Noul Container de Quiz */
        #quiz-module {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px;
            margin: 80px 0;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .progress-container { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 40px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-gradient); width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .q-text { font-size: 1.6rem; font-weight: 600; color: #fff; margin-bottom: 35px; min-height: 80px; }

        .options-grid { display: grid; gap: 12px; }
        .opt-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 18px 25px;
            border-radius: 16px;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .opt-card:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent);
            color: #fff;
            transform: translateX(8px);
        }

        .opt-card.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* Rezultate */
        .result-screen { display: none; text-align: center; animation: fadeIn 0.6s ease; }
        .score-circle {
            width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 800; margin: 0 auto 20px;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .counter { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<nav><div class="container"><a href="../index.html" class="logo">MINDCHECK</a></div></nav>

<div class="container">
    <main class="article-body">
        <h1 class="hero-title">Arhitecții Haosului</h1>
        <p style="font-size: 1.2rem; color: #94a3b8;">„Nu suntem neatenți la lume, suntem prea atenți la prea multe lumi deodată.”</p>
        
        <!-- Aici ramane textul tau frumos integrat anterior -->

        <div id="quiz-module">
            <div id="quiz-content">
                <span class="counter" id="q-counter">Întrebarea 1 / 18</span>
                <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
                <div class="q-text" id="question-text">Se încarcă...</div>
                
                <div class="options-grid">
                    <div class="opt-card" onclick="handleSelect(0)">Niciodată</div>
                    <div class="opt-card" onclick="handleSelect(1)">Rar</div>
                    <div class="opt-card" onclick="handleSelect(2)">Uneori</div>
                    <div class="opt-card" onclick="handleSelect(3)">Deseori</div>
                    <div class="opt-card" onclick="handleSelect(4)">Foarte des</div>
                </div>
            </div>

            <div id="result-screen" class="result-screen">
                <div class="score-circle" id="final-score">0</div>
                <h2 id="result-title">Analiză Finalizată</h2>
                <p id="result-desc" style="margin-bottom: 30px; color: #94a3b8;"></p>
                <button class="btn" onclick="location.reload()">Reia Testul</button>
            </div>
        </div>
    </main>
</div>

<script>
    const questions = [
        // Partea A
        "Cât de des ai dificultăți în a finaliza detaliile unui proiect, după ce părțile dificile au fost gata?",
        "Cât de des ai dificultăți în a organiza lucrurile când ai de făcut o sarcină care necesită planificare?",
        "Cât de des ai probleme în a-ți aminti întâlniri sau obligații?",
        "Când ai o sarcină care necesită multă gândire, cât de des eviți sau amâni începerea ei?",
        "Cât de des te foiești sau îți miști mâinile ori picioarele când trebuie să stai așezat mult timp?",
        "Cât de des te simți hiperactiv și condus de un motor, ca și cum n-ai putea sta locului?",
        // Partea B
        "Cât de des faci greșeli din neglijență când ai de lucrat la un proiect plictisitor sau dificil?",
        "Cât de des ai dificultăți în a-ți menține atenția când faci o muncă plictisitoare sau repetitivă?",
        "Cât de des ai dificultăți în a te concentra la ceea ce îți spun oamenii, chiar și când îți vorbesc direct?",
        "Cât de des rătăcești sau ai dificultăți în a găsi lucruri acasă sau la serviciu?",
        "Cât de des ești distras de activități sau zgomote din jurul tău?",
        "Cât de des părăsești locul în ședințe sau în alte situații în care ar trebui să rămâi așezat?",
        "Cât de des te simți neliniștit sau agitat?",
        "Cât de des ai dificultăți în a te relaxa și a te liniști când ai timp liber doar pentru tine?",
        "Cât de des te surprinzi vorbind prea mult când ești în situații sociale?",
        "Când ești într-o conversație, cât de des te surprinzi terminând propozițiile oamenilor înainte ca ei să le termine?",
        "Cât de des ai dificultăți în a-ți aștepta rândul în situațiile în care este necesar acest lucru?",
        "Cât de des îi întrerupi pe ceilalți când sunt ocupați?"
    ];

    let currentIdx = 0;
    let score = 0;

    function updateQuiz() {
        const qText = document.getElementById('question-text');
        const counter = document.getElementById('q-counter');
        const bar = document.getElementById('p-bar');

        qText.style.opacity = 0;
        setTimeout(() => {
            qText.innerText = questions[currentIdx];
            qText.style.opacity = 1;
        }, 200);

        counter.innerText = `Întrebarea ${currentIdx + 1} / 18`;
        bar.style.width = `${((currentIdx) / questions.length) * 100}%`;
    }

    function handleSelect(val) {
        score += val;
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            updateQuiz();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-content').style.display = 'none';
        const screen = document.getElementById('result-screen');
        screen.style.display = 'block';
        
        const scoreEl = document.getElementById('final-score');
        const titleEl = document.getElementById('result-title');
        const descEl = document.getElementById('result-desc');

        scoreEl.innerText = score;
        
        if (score >= 45) {
            titleEl.innerText = "Probabilitate Ridicată";
            descEl.innerText = "Scorul tău indică prezența multor simptome specifice ADHD-ului la adulți. Ar fi extrem de util să discuți aceste rezultate cu un specialist.";
        } else if (score >= 25) {
            titleEl.innerText = "Trăsături Moderate";
            descEl.innerText = "Ai un scor care sugerează anumite dificultăți de atenție sau organizare. Nu este un diagnostic, dar poate fi un punct de plecare pentru auto-reflecție.";
        } else {
            titleEl.innerText = "Simptome Minime";
            descEl.innerText = "Rezultatele tale nu indică prezența unui tipar clinic de ADHD în acest moment.";
        }
    }

    updateQuiz();
</script>

</body>
</html>
